<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — AeroChronos</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Buykori AdSync Tracker SDK -->
  <script src="config.js"></script>
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.capi)return;n=f.capi=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._capi)f._capi=n;n.push=n;n.loaded=!0;n.version='1.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window,document,'script',
    BUYKORI_CONFIG.gatewayUrl + '/t.js?key=' + BUYKORI_CONFIG.apiKey);
  </script>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">AEROCHRONOS</a>
      <nav class="nav-menu">
        <a href="index.html" class="nav-link">Shop</a>
        <a href="checkout.html" class="nav-link active">Checkout</a>
      </nav>
      <div class="cart-icon">
        <a href="checkout.html">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          <span class="cart-badge" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <main>
    <div class="checkout-layout">
      <!-- Checkout Billing Details Form -->
      <div class="checkout-card">
        <h2>Shipping Information</h2>
        <form id="checkout-form" onsubmit="processPurchase(event)">
          <div class="form-group-row">
            <div class="form-group">
              <label for="first_name">First Name</label>
              <input type="text" id="first_name" class="form-control" required placeholder="John">
            </div>
            <div class="form-group">
              <label for="last_name">Last Name</label>
              <input type="text" id="last_name" class="form-control" required placeholder="Doe">
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" required placeholder="john.doe@example.com">
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" class="form-control" required placeholder="01712345678">
          </div>

          <div class="form-group">
            <label for="address">Street Address</label>
            <input type="text" id="address" class="form-control" required placeholder="123 Technology Way">
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label for="city">City</label>
              <input type="text" id="city" class="form-control" required placeholder="Dhaka">
            </div>
            <div class="form-group">
              <label for="state">State / Division</label>
              <input type="text" id="state" class="form-control" required placeholder="Dhaka Division">
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label for="zip">ZIP / Postal Code</label>
              <input type="text" id="zip" class="form-control" required placeholder="1212">
            </div>
            <div class="form-group">
              <label for="country">Country</label>
              <input type="text" id="country" class="form-control" required placeholder="BD">
            </div>
          </div>

          <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; padding: 1rem;">
            Place Order (Cash on Delivery)
          </button>
        </form>
      </div>

      <!-- Order Summary Card -->
      <div class="checkout-card" style="height: fit-content;">
        <h2>Order Summary</h2>
        <div id="cart-items-container">
          <!-- Dynamically populated -->
        </div>

        <div style="margin-top: 2rem;">
          <div class="summary-item">
            <span>Subtotal</span>
            <span id="subtotal-amount">0 BDT</span>
          </div>
          <div class="summary-item">
            <span>Shipping</span>
            <span>Free</span>
          </div>
          <div class="summary-total">
            <span>Total</span>
            <span id="total-amount">0 BDT</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 AeroChronos Store. All rights reserved.</p>
  </footer>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

    function updateCartUI() {
      // Nav badge
      let count = cart.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById('cart-count').innerText = count;

      // Cart Container
      let container = document.getElementById('cart-items-container');
      if (cart.length === 0) {
        container.innerHTML = `<p style="color: var(--text-secondary); text-align: center;">Your cart is empty.</p>`;
        return;
      }

      container.innerHTML = cart.map(item => `
        <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1.2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
          <img src="${item.img}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px;">
          <div style="flex-grow: 1;">
            <h4 style="font-size: 1rem; font-weight: 600;">${item.name}</h4>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Qty: ${item.qty} &times; ${item.price} BDT</p>
          </div>
          <span style="font-weight: 600;">${item.price * item.qty} BDT</span>
        </div>
      `).join('');

      document.getElementById('subtotal-amount').innerText = total.toLocaleString() + ' BDT';
      document.getElementById('total-amount').innerText = total.toLocaleString() + ' BDT';
    }

    // TRACK INITIATE CHECKOUT
    if (cart.length > 0 && window.capi) {
      capi('track', 'InitiateCheckout', {
        value: total,
        currency: 'BDT',
        content_ids: cart.map(item => String(item.id)),
        content_type: 'product',
        num_items: cart.reduce((sum, item) => sum + item.qty, 0)
      });
    }

    function processPurchase(e) {
      e.preventDefault();
      
      let email = document.getElementById('email').value;
      let phone = document.getElementById('phone').value;
      let firstName = document.getElementById('first_name').value;
      let lastName = document.getElementById('last_name').value;
      let city = document.getElementById('city').value;
      let state = document.getElementById('state').value;
      let zip = document.getElementById('zip').value;
      let country = document.getElementById('country').value;

      // 1. Set User info on tracker (Automatically hashes PII fields: em, ph, fn, ln, ct, st, zp, country)
      if (window.capi) {
        capi('setUser', {
          email: email,
          phone: phone,
          first_name: firstName,
          last_name: lastName,
          city: city,
          state: state,
          zip: zip,
          country: country
        });

        // Generate a random order ID to link pages and deduplicate if needed
        let orderId = 'ORD-' + Math.floor(100000 + Math.random() * 900000);
        
        // 2. Track Purchase event
        capi('track', 'Purchase', {
          value: total,
          currency: 'BDT',
          content_ids: cart.map(item => String(item.id)),
          content_type: 'product',
          order_id: orderId,
          num_items: cart.reduce((sum, item) => sum + item.qty, 0)
        });

        // Store order summary for thankyou.html
        let orderDetails = {
          orderId: orderId,
          total: total,
          email: email,
          items: cart
        };
        localStorage.setItem('lastOrder', JSON.stringify(orderDetails));
        
        // Clear cart
        localStorage.removeItem('cart');

        // Wait a split second for beacon payload transmission then redirect
        setTimeout(() => {
          window.location.href = 'thankyou.html';
        }, 300);
      } else {
        // Fallback redirection
        window.location.href = 'thankyou.html';
      }
    }

    updateCartUI();
  </script>
</body>
</html>
